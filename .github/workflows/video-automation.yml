name: Video Automation Pipeline

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Project ID'
        required: true
      project_title:
        description: 'Video Title (for history/naming)'
        required: false
      niche:
        description: 'Content niche'
        required: true
      script:
        description: 'Video script'
        required: true
      segments_json:
        description: 'Timestamped segments JSON'
        required: true
      voice_mode:
        description: 'Voice mode (ai-tts/upload/mp3-first)'
        required: true
      voice_style:
        description: 'Voice style'
        required: true
      audio_url:
        description: 'Temporary URL for uploaded custom audio'
        required: false
      scraper_mode:
        description: 'Scraper Mode (auto/pexels/tiktok)'
        required: false
      caption_color:
        description: 'Caption Highlighting Color'
        required: false
      caption_font:
        description: 'Caption Font'
        required: false
      caption_size:
        description: 'Caption Font Size'
        required: false
      show_memes:
        description: 'Toggle Meme Overlays'
        required: false
      PEXELS_API_KEY:
        description: 'Pexels API Key'
        required: false

jobs:
  produce-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick libmagickwand-dev
          # Fix ImageMagick security policy to allow TextClip
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: |
          pip install "moviepy<2.0.0" yt-dlp edge-tts libsql-experimental httpx "Pillow<10.0.0" gTTS requests openai-whisper setuptools

      - name: Run automation pipeline
        env:
          PROJECT_ID: ${{ github.event.inputs.project_id }}
          PROJECT_TITLE: ${{ github.event.inputs.project_title }}
          NICHE: ${{ github.event.inputs.niche }}
          SCRIPT: ${{ github.event.inputs.script }}
          SEGMENTS_JSON: ${{ github.event.inputs.segments_json }}
          VOICE_MODE: ${{ github.event.inputs.voice_mode }}
          VOICE_STYLE: ${{ github.event.inputs.voice_style }}
          AUDIO_URL: ${{ github.event.inputs.audio_url }}
          SCRAPER_MODE: ${{ github.event.inputs.scraper_mode }}
          CAPTION_COLOR: ${{ github.event.inputs.caption_color }}
          CAPTION_FONT: ${{ github.event.inputs.caption_font }}
          CAPTION_SIZE: ${{ github.event.inputs.caption_size }}
          SHOW_MEMES: ${{ github.event.inputs.show_memes }}
          PEXELS_API_KEY: ${{ github.event.inputs.PEXELS_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python automation/pipeline.py

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video-${{ github.event.inputs.project_id }}
          path: output/*.mp4
          retention-days: 7
